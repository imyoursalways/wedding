<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Custom Wordle ❤️</title>
    <style>
        :root {
            --correct: #ff3366; 
            --present: #f1c40f;
            --absent: #2c2c2e;
            --bg: #0b0b0d;
            --tile-border: #222224;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            height: -webkit-fill-available; /* Fixed mobile viewport bug */
            margin: 0;
            padding: 5px 0;
            box-sizing: border-box;
            overflow: hidden;
            position: relative;
            -webkit-user-select: none;
            user-select: none;
        }

        html {
            height: -webkit-fill-available;
        }

        #animationCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            will-change: transform; /* Hint to mobile GPUs to accelerate */
        }

        header, #board-container, #keyboard {
            position: relative;
            z-index: 2; 
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 5px 0;
            border-bottom: 1px solid var(--tile-border);
            background: rgba(11, 11, 13, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ff3366, #ff758c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            margin: 3px 0 0 0;
            color: #b0b0b5;
            font-size: 0.8rem;
        }

        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding: 10px 0;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            width: 280px;  /* Compact dimensions optimized for mobile */
            height: 340px;
            max-width: 85vw;
            max-height: 45vh;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }

        .tile {
            width: 100%;
            height: 100%;
            border: 2px solid var(--tile-border);
            background: rgba(18, 18, 22, 0.85);
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            box-sizing: border-box;
            border-radius: 6px;
        }

        .tile[data-state="pop"] {
            transform: scale(1.05);
            border-color: #9e9eaf;
        }

        .tile[data-state="correct"] { background-color: var(--correct); border-color: var(--correct); }
        .tile[data-state="present"] { background-color: var(--present); border-color: var(--present); }
        .tile[data-state="absent"] { background-color: var(--absent); border-color: var(--absent); }

        #keyboard {
            padding: 0 6px 10px 6px;
            touch-action: none; /* Prevents double-tap zoom delay on mobile */
        }

        .keyboard-row {
            display: flex;
            justify-content: center;
            margin-bottom: 6px;
        }

        .key {
            background-color: #3a3a3e;
            color: #ffffff;
            border: 0;
            padding: 0;
            margin: 0 2px;
            height: 48px; /* Taller tap target for mobile thumbs */
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1rem;
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
        }

        .key.wide {
            flex: 1.5;
            font-size: 0.8rem;
        }

        .key[data-state="correct"] { background-color: var(--correct); }
        .key[data-state="present"] { background-color: var(--present); }
        .key[data-state="absent"] { background-color: var(--absent); }

        #message-container {
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            pointer-events: none;
        }

        .toast {
            background-color: #ffffff;
            color: #000000;
            padding: 10px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 20;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(5, 5, 8, 0.85);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #19191f;
            padding: 25px;
            border-radius: 16px;
            max-width: 340px;
            width: 85%;
            text-align: center;
            border: 2px solid #ff3366;
        }

        .modal h2 { margin: 0 0 10px 0; color: var(--correct); font-size: 1.6rem; }
        .modal p { line-height: 1.5; color: #e5e5ea; font-size: 0.95rem; }

        .btn {
            background: linear-gradient(45deg, #ff3366, #ff5e7e);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        @keyframes flip {
            0% { transform: rotateX(0deg); }
            45% { transform: rotateX(90deg); }
            55% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }
    </style>
</head>
<body>

    <canvas id="animationCanvas"></canvas>

    <header>
        <h1>WORDLE: 🌹❤️ Chakkara and Ponnumma 🌹❤️</h1>
        <p class="subtitle">Every word is a milestone. Guess our secret word.</p>
    </header>

    <div id="message-container"></div>

    <div id="board-container">
        <div id="board"></div>
    </div>

    <div id="keyboard">
        <div class="keyboard-row">
            <button class="key" data-key="Q">Q</button>
            <button class="key" data-key="W">W</button>
            <button class="key" data-key="E">E</button>
            <button class="key" data-key="R">R</button>
            <button class="key" data-key="T">T</button>
            <button class="key" data-key="Y">Y</button>
            <button class="key" data-key="U">U</button>
            <button class="key" data-key="I">I</button>
            <button class="key" data-key="O">O</button>
            <button class="key" data-key="P">P</button>
        </div>
        <div class="keyboard-row">
            <button class="key" data-key="A">A</button>
            <button class="key" data-key="S">S</button>
            <button class="key" data-key="D">D</button>
            <button class="key" data-key="F">F</button>
            <button class="key" data-key="G">G</button>
            <button class="key" data-key="H">H</button>
            <button class="key" data-key="J">J</button>
            <button class="key" data-key="K">K</button>
            <button class="key" data-key="L">L</button>
        </div>
        <div class="keyboard-row">
            <button class="key wide" data-key="ENTER">ENTER</button>
            <button class="key" data-key="Z">Z</button>
            <button class="key" data-key="X">X</button>
            <button class="key" data-key="C">C</button>
            <button class="key" data-key="V">V</button>
            <button class="key" data-key="B">B</button>
            <button class="key" data-key="N">N</button>
            <button class="key" data-key="M">M</button>
            <button class="key wide" data-key="BACKSPACE">BACK</button>
        </div>
    </div>

    <div id="endModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Perfect Match! 🌹❤️</h2>
            <p id="modalSecretWord"></p>
            <p id="modalMessage"></p>
            <button class="btn" onclick="nextWord()">Reveal Next Memory</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION & WORDS
        // ==========================================
        const JOKE_WORDS = [
            { word: "BLOOM", hint: "It lingered in bud, waited for us to make the moment beautiful🌸🌸." },
            { word: "APRIL", hint: "That unforgettable month when our lips first met is forever burned into my soul; I can still taste the sweetness of that moment.❤️" },
            { word: "SEOUL", hint:"If you look at a globe, this five-letter destination is a bustling metropolis across the sea. But to me, it isn't just a coordinates on a map; it is the sacred place where my life truly began, under a canopy of pink petals." },
            { word: "LATTE", hint: "☕All our memories we store here and our favorite drink☕." },
            { word: "LINDT", hint: "They spell out a world-renowned name in luxury chocolate." },
        ];

        let currentWordIndex = 0;
        let secretWord = JOKE_WORDS[currentWordIndex].word;
        let hintMessage = JOKE_WORDS[currentWordIndex].hint;
        let currentRow = 0, currentTile = 0;
        let guesses = ["", "", "", "", "", ""];
        let gameOver = false;

        const board = document.getElementById("board");
        function createBoard() {
            board.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement("div");
                    tile.className = "tile";
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }
        createBoard();

        // Mobile Friendly Event Binding
        document.querySelectorAll(".key").forEach(key => {
            key.addEventListener("touchstart", (e) => {
                e.preventDefault(); // Prevents simulated mouse click latency delay
                handleInput(key.getAttribute("data-key"));
            }, {passive: false});
            key.addEventListener("click", () => handleInput(key.getAttribute("data-key")));
        });

        window.addEventListener("keydown", (e) => {
            if (gameOver) return;
            let key = e.key.toUpperCase();
            if (key === "ENTER") handleInput("ENTER");
            else if (key === "BACKSPACE" || key === "DELETE") handleInput("BACKSPACE");
            else if (/^[A-Z]$/.test(key)) handleInput(key);
        });

        function handleInput(key) {
            if (gameOver) return;
            if (key === "ENTER") submitGuess();
            else if (key === "BACKSPACE") deleteLetter();
            else addLetter(key);
        }

        function addLetter(letter) {
            if (currentTile < 5 && currentRow < 6) {
                const rows = board.querySelectorAll(".row");
                const tiles = rows[currentRow].querySelectorAll(".tile");
                tiles[currentTile].textContent = letter;
                tiles[currentTile].setAttribute("data-state", "pop");
                guesses[currentRow] += letter;
                currentTile++;
            }
        }

        function deleteLetter() {
            if (currentTile > 0) {
                currentTile--;
                const rows = board.querySelectorAll(".row");
                const tiles = rows[currentRow].querySelectorAll(".tile");
                tiles[currentTile].textContent = "";
                tiles[currentTile].removeAttribute("data-state");
                guesses[currentRow] = guesses[currentRow].slice(0, -1);
            }
        }

        function submitGuess() {
            const guess = guesses[currentRow];
            if (guess.length < 5) {
                showToast("Not enough letters!");
                return;
            }

            const rows = board.querySelectorAll(".row");
            const tiles = rows[currentRow].querySelectorAll(".tile");
            let targetWord = secretWord;
            let tileStates = Array(5).fill("absent");
            let targetLetterCounts = {};

            for (let letter of targetWord) targetLetterCounts[letter] = (targetLetterCounts[letter] || 0) + 1;
            for (let i = 0; i < 5; i++) {
                if (guess[i] === targetWord[i]) {
                    tileStates[i] = "correct";
                    targetLetterCounts[guess[i]]--;
                }
            }
            for (let i = 0; i < 5; i++) {
                if (tileStates[i] !== "correct" && targetWord.includes(guess[i])) {
                    if (targetLetterCounts[guess[i]] > 0) {
                        tileStates[i] = "present";
                        targetLetterCounts[guess[i]]--;
                    }
                }
            }

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    tiles[i].style.animation = "flip 0.4s ease forwards";
                    tiles[i].setAttribute("data-state", tileStates[i]);
                    updateKeyboardColors(guess[i], tileStates[i]);
                    if (tileStates[i] === "correct") spawnExplosionLayer(8, false);
                }, i * 90);
            }

            setTimeout(() => {
                if (guess === secretWord) endGame(true);
                else if (currentRow === 5) endGame(false);
                else { currentRow++; currentTile = 0; }
            }, 550);
        }

        function updateKeyboardColors(letter, state) {
            const keyEl = document.querySelector(`.key[data-key="${letter}"]`);
            if (!keyEl) return;
            const currentState = keyEl.getAttribute("data-state");
            if (currentState === "correct") return;
            if (currentState === "present" && state === "absent") return;
            keyEl.setAttribute("data-state", state);
        }

        function showToast(text) {
            const container = document.getElementById("message-container");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.textContent = text;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 1800);
        }

        function endGame(isWin) {
            gameOver = true;
            const modal = document.getElementById("endModal");
            document.getElementById("modalSecretWord").innerHTML = `Word was: <strong>${secretWord}</strong>`;
            document.getElementById("modalMessage").textContent = isWin ? hintMessage : `Always love you anyway! ❤️ ${hintMessage}`;
            if (isWin) {
                for(let burst = 0; burst < 10; burst++) {
                    setTimeout(() => { spawnExplosionLayer(15, true); }, burst * 100);
                }
            }
            setTimeout(() => { modal.style.display = "flex"; }, 600);
        }

        function nextWord() {
            currentWordIndex = (currentWordIndex + 1) % JOKE_WORDS.length;
            secretWord = JOKE_WORDS[currentWordIndex].word;
            hintMessage = JOKE_WORDS[currentWordIndex].hint;
            currentRow = 0; currentTile = 0; guesses = ["", "", "", "", "", ""]; gameOver = false;
            document.getElementById("endModal").style.display = "none";
            createBoard();
            document.querySelectorAll(".key").forEach(k => k.removeAttribute("data-state"));
        }

        // ==========================================
        // HIGH REFRESH RATE HARDWARE ACCELERATED CANVAS
        // ==========================================
        const canvas = document.getElementById("animationCanvas");
        const ctx = canvas.getContext("2d");
        let particles = [];
        
        const emojiList = ["🌹", "💍", "🌸", "🌹", "❤️", "💖", "💝", "🐾","💍", "🐶", "🐱", "✨","🌸"];
        const cachedCanvases = {};

        // Pre-render font emojis into static pixel images on startup to eliminate layout recalculations inside rendering loop
        function preRenderEmojis() {
            const sizes = [20, 30, 45, 60]; // Pre-caches different scaling profiles
            emojiList.forEach(emoji => {
                cachedCanvases[emoji] = {};
                sizes.forEach(size => {
                    const offscreenCanvas = document.createElement("canvas");
                    offscreenCanvas.width = size * 1.5;
                    offscreenCanvas.height = size * 1.5;
                    const oCtx = offscreenCanvas.getContext("2d");
                    oCtx.font = `${size}px Arial`;
                    oCtx.textAlign = "center";
                    oCtx.textBaseline = "middle";
                    oCtx.fillText(emoji, offscreenCanvas.width / 2, offscreenCanvas.height / 2);
                    cachedCanvases[emoji][size] = offscreenCanvas;
                });
            });
        }
        preRenderEmojis();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class SmoothParticle {
            constructor(type = "ambient") {
                this.type = type;
                this.char = emojiList[Math.floor(Math.random() * emojiList.length)];
                
                // Pick cached size template buckets
                if (this.char === "🌹") {
                    this.sizeIndex = Math.random() > 0.5 ? 60 : 45;
                } else {
                    this.sizeIndex = Math.random() > 0.5 ? 30 : 20;
                }

                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.alpha = 1;

                if (this.type === "ambient") {
                    this.x = Math.random() * canvas.width;
                    this.y = canvas.height + Math.random() * 100;
                    this.vx = (Math.random() - 0.5) * 0.8;
                    this.vy = -(Math.random() * 0.8 + 0.3);
                    this.alpha = Math.random() * 0.25 + 0.1; 
                } else if (this.type === "burst") {
                    this.x = canvas.width / 2;
                    this.y = canvas.height / 2.2;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 4 + 2;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.decay = Math.random() * 0.02 + 0.015;
                } else {
                    // Rain/shower down elegantly
                    this.x = Math.random() * canvas.width;
                    this.y = -50;
                    this.vx = (Math.random() - 0.5) * 2;
                    this.vy = Math.random() * 3 + 2;
                    this.decay = Math.random() * 0.006 + 0.003;
                }
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotationSpeed;
                if (this.type === "ambient") {
                    if (this.y < -60) {
                        this.y = canvas.height + 60;
                        this.x = Math.random() * canvas.width;
                    }
                } else {
                    this.alpha -= this.decay;
                }
            }

            draw() {
                if (this.alpha <= 0) return;
                const cache = cachedCanvases[this.char][this.sizeIndex];
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                // Draws pre-rasterized flat pixel assets instantly (Super performant on phones)
                ctx.drawImage(cache, -cache.width / 2, -cache.height / 2);
                ctx.restore();
            }
        }

        // Ambient load safety thresholds for slow mobile processors
        const ambientCount = window.innerWidth < 600 ? 45 : 90;
        for (let i = 0; i < ambientCount; i++) {
            particles.push(new SmoothParticle("ambient"));
        }

        function spawnExplosionLayer(count, isVictoryShower = false) {
            const mode = isVictoryShower ? "shower" : "burst";
            // Hard limit overall particle size stack to guard frame rates
            if (particles.length > 250) return;
            for(let i = 0; i < count; i++) {
                particles.push(new SmoothParticle(mode));
            }
        }

        function runEngine() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].type !== "ambient" && particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(runEngine);
        }
        runEngine();
    </script>
</body>
</html>
